version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    # For production, Traefik/Dokploy will route traffic directly to the internal 8000 port
    # Remove public exposed port to avoid bypassing reverse proxy.
    ports:
      - "8000"
    environment:
      - APP_ENV=production
      - OCTANE_SERVER=frankenphp
    restart: unless-stopped

  worker-ai:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: php artisan queue:work --queue=ai --timeout=120 --tries=3 --max-jobs=100 --max-time=3600
    environment:
      - APP_ENV=production
    restart: unless-stopped
    stop_grace_period: 130s

  worker-scraping:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: php artisan queue:work --queue=scraping,default --timeout=60 --max-jobs=100 --max-time=3600
    environment:
      - APP_ENV=production
    restart: unless-stopped
    stop_grace_period: 130s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: php artisan schedule:work
    environment:
      - APP_ENV=production
    restart: unless-stopped
